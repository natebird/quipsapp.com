    <script>
        async function loadCollection() {
            const container = document.getElementById('collection-detail');
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                container.innerHTML = '<p class="error-text">No collection specified. <a href="collections.html">Browse all collections.</a></p>';
                return;
            }

            try {
                const response = await fetch(`collections/${encodeURIComponent(id)}.json`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const collection = await response.json();
                renderCollection(collection, id);
            } catch (error) {
                console.error('Error loading collection:', error);
                container.innerHTML = '<p class="error-text">Unable to load this collection. <a href="collections.html">Browse all collections.</a></p>';
            }
        }

        // Point crawlers that execute JS at the pre-rendered static page for
        // this collection (the canonical version of this content).
        function updatePageMeta(collection, id, quoteCount) {
            const title = /\bquotes?\b/i.test(collection.name)
                ? `${collection.name} — Quips`
                : `${collection.name} Quotes — Quips`;
            document.title = title;

            const description = `${collection.description} Read all ${quoteCount} quotes in the ${collection.name} collection, free from Quips.`;
            const metaDescription = document.querySelector('meta[name="description"]');
            if (metaDescription) metaDescription.setAttribute('content', description);

            const canonicalUrl = `https://quipsapp.com/collections/${encodeURIComponent(id)}.html`;
            let canonical = document.querySelector('link[rel="canonical"]');
            if (!canonical) {
                canonical = document.createElement('link');
                canonical.setAttribute('rel', 'canonical');
                document.head.appendChild(canonical);
            }
            canonical.setAttribute('href', canonicalUrl);
        }

        function renderCollection(collection, id) {
            const container = document.getElementById('collection-detail');
            const quotes = collection.quotes || [];

            updatePageMeta(collection, id, quotes.length);

            const quoteCards = quotes.map(quote => `
                <div class="quote-item">
                    <p class="quote-text">${escapeHtml(quote.content)}</p>
                    <div class="quote-attribution">
                        <span class="quote-author">${escapeHtml(quote.authorName)}</span>
                        ${quote.source ? `<span class="quote-source">${escapeHtml(quote.source)}</span>` : ''}
                    </div>
                    ${quote.notes ? `<p class="quote-note">${escapeHtml(quote.notes)}</p>` : ''}
                </div>
            `).join('');

            container.innerHTML = `
                <div class="collection-hero" data-color="${escapeHtml(collection.colorName)}">
                    <div class="collection-icon">${getIconSvg(collection.iconName)}</div>
                    <h1>${escapeHtml(collection.name)}</h1>
                    <div class="collection-hero-meta">
                        <span class="collection-hero-badge">${escapeHtml(collection.category)}</span>
                        <span>${quotes.length} quotes</span>
                    </div>
                    <p>${escapeHtml(collection.description)}</p>
                </div>
                <div class="quotes-grid" data-color="${escapeHtml(collection.colorName)}">
                    ${quoteCards}
                </div>
                <section class="cta collection-cta">
                    <div class="container cta-content">
                        <img src="images/app-icon.png" alt="Quips app icon" class="cta-icon app-icon-light" width="512" height="512" loading="lazy"><img src="images/app-icon-dark.png" alt="Quips app icon" class="cta-icon app-icon-dark" width="512" height="512" loading="lazy">
                        <h2 class="cta-title">Add this collection to your library</h2>
                        <p class="cta-subtitle">Get Quips and add ${escapeHtml(collection.name)} to your library with one tap.</p>
                        <span class="btn btn-coming-soon">Coming Soon to the App Store</span>
                        <!-- TODO(launch): swap in badge linking to /go/appstore.html?p=collection -->
                    </div>
                </section>
            `;
        }

        document.addEventListener('DOMContentLoaded', loadCollection);
    </script>
