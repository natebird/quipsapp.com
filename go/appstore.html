<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://cloudflareinsights.com; form-action 'self'; base-uri 'self'; object-src 'none';">
    <meta name="robots" content="noindex">
    <title>Quips on the App Store</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #FFFFFF;
            color: #1A1A1A;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
            text-align: center;
            line-height: 1.6;
        }
        @media (prefers-color-scheme: dark) {
            body { background-color: #121212; color: #F5F5F5; }
        }
        h1 { font-family: 'Baskerville', Georgia, serif; font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { margin: 0.25rem 0; }
        a { color: #00B8B2; }
    </style>
</head>
<body>
    <main>
        <h1>Quips is coming soon to the App Store</h1>
        <p id="redirect-msg" hidden>Taking you to the App Store&hellip; If nothing happens, <a id="store-link" href="https://quipsapp.com/">tap here</a>.</p>
        <p id="comingsoon-msg">We're putting on the finishing touches. In the meantime, <a href="https://quipsapp.com/">explore Quips on our website</a>.</p>
    </main>
    <script>
    (function () {
        // TODO(launch): set real app id + provider token below, then this page
        // starts redirecting instead of showing the coming-soon message.
        // Pageviews of this page in Cloudflare Web Analytics = badge clicks.
        var APP_STORE_BASE = 'https://apps.apple.com/app/idXXXXXXXXXX?pt=TODO';

        var ALLOWED_PLACEMENTS = ['hero', 'cta', 'nav', 'collection'];
        var param = new URLSearchParams(window.location.search).get('p');
        var placement = ALLOWED_PLACEMENTS.indexOf(param) !== -1 ? param : 'site';
        var url = APP_STORE_BASE + '&ct=website-' + placement;

        // Not launched yet (placeholder id still in the URL): keep the
        // friendly coming-soon message and skip the redirect.
        if (url.indexOf('XXXXXXXXXX') !== -1) return;

        document.getElementById('comingsoon-msg').hidden = true;
        var msg = document.getElementById('redirect-msg');
        msg.hidden = false;
        document.getElementById('store-link').href = url;
        window.location.replace(url);
    })();
    </script>
</body>
</html>
