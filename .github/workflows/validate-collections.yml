name: Validate collections

on:
  push:
    paths:
      - 'collections.json'
      - 'collections/**'
      - 'scripts/validate_collections.py'
      - '.github/workflows/validate-collections.yml'
  pull_request:
    paths:
      - 'collections.json'
      - 'collections/**'
      - 'scripts/validate_collections.py'
      - '.github/workflows/validate-collections.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      # Validator is stdlib-only; no dependencies to install.
      - name: Validate collections data
        run: python3 scripts/validate_collections.py
