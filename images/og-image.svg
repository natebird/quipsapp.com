<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Source for images/og-image.png (1200x630 social preview).
       Regenerate the PNG after editing: render this file in a browser at
       1200x630 (e.g. Playwright screenshot at deviceScaleFactor 2, then
       downscale) — see docs/SITE-CONVENTIONS.md. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00D7D0"/>
      <stop offset="1" stop-color="#00B8B2"/>
    </linearGradient>
    <filter id="lift" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#004E4B" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Quotation accent — full-contrast white with a soft shadow so it pops -->
  <text x="600" y="205" text-anchor="middle"
        font-family="Baskerville, Georgia, serif" font-weight="700"
        font-size="260" fill="#FFFFFF" filter="url(#lift)">&#8220;</text>

  <!-- Wordmark in the site's serif heading face -->
  <text x="600" y="330" text-anchor="middle"
        font-family="Baskerville, Georgia, serif" font-weight="700"
        font-size="150" fill="#FFFFFF" filter="url(#lift)">Quips</text>

  <!-- Tagline (site eyebrow copy) -->
  <text x="600" y="430" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600"
        font-size="30" letter-spacing="5" fill="#FFFFFF" opacity="0.95">QUOTES DESERVE MORE THAN A SCREENSHOT</text>

  <text x="600" y="530" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500"
        font-size="28" fill="#FFFFFF" opacity="0.8">quipsapp.com</text>
</svg>
